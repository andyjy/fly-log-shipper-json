[api]
  enabled = true
  address = "[::]:8686"

[sources.fly_log_metrics]
  type = "internal_metrics"

[sources.nats]
  type = "nats"
  url = "nats://[${NETWORK-fdaa}::3]:4223"
  queue = "${QUEUE-}"
  subject = "${SUBJECT-logs.>}"
  auth.strategy = "user_password"
  auth.user_password.user = "${ORG-personal}"
  auth.user_password.password = "${ACCESS_TOKEN?}"
  connection_name = "Fly logs stream"

[transforms.log_json_from_fly]
  type = "remap"
  inputs = ["nats"]
  source = '''
  . = parse_json!(.message)
  '''

[transforms.log_json]
type = "remap"
inputs = ["log_json_from_fly"]
source = '''
if exists(.message) && is_string(.message) {
  parsed = parse_regex(.message, r'^(?P<message_text>.*?)(?P<metadata>\{.*\})\s*$') ?? null

  if parsed != null {
    metadata = parse_json(parsed.metadata) ?? {}

    if is_object(metadata) && is_object(.) {
      message_text = strip_whitespace(to_string(parsed.message_text))

      # Only keep trimmed prefix as .message if there actually is one
      if message_text != "" {
        .message = message_text
      } else {
        del(.message)
      }

      . = merge(., metadata)
    }
  }
}
'''

[sinks.fly_log_metrics_prometheus]
  type = "prometheus_exporter" # required
  inputs = ["fly_log_metrics"] # required
  address = "[::]:9598" # required
  default_namespace = "fly-logs" # optional, no default

[sinks.blackhole]
  type = "blackhole"
  inputs = ["log_json"]
  print_interval_secs = 100000
